<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Таблица Шульте - Уровни</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b1528;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
        }

        #welcome-screen {
            text-align: center;
            padding: 40px;
        }

        #welcome-screen input {
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #14b8a6;
            background: #1a2639;
            color: white;
            margin: 20px 0;
            width: 250px;
        }

        #game-screen {
            display: none;
            width: 100%;
            max-width: 1400px;
            margin-top: 20px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 30px;
            width: 100%;
        }

        .side-panel {
            background: #1a2639;
            border-radius: 10px;
            padding: 20px;
            align-self: start;
        }

        .side-panel h2 {
            margin-top: 0;
            color: #14b8a6;
            text-align: center;
        }

        .center-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .timer-display #timer {
            font-size: 42px;
            font-weight: bold;
            color: #00ffaa;
            margin: 10px 0;
        }

        .instruction-text {
            font-size: 18px;
            color: #a0b3d1;
            text-align: center;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .info-panel {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
            gap: 15px;
            width: 100%;
        }

        .info-box {
            background: #1a2639;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
        }

        .level-indicator {
            background: #14b8a6;
            color: #012b28;
            font-weight: bold;
        }

        #grid {
            display: grid;
            grid-gap: 10px;
            margin: 20px auto;
            justify-content: center;
        }

        .grid-level-1 {
            grid-template-columns: repeat(6, 80px);
        }

        .grid-level-2 {
            grid-template-columns: repeat(8, 70px);
        }

        .grid-level-3 {
            grid-template-columns: repeat(10, 65px);
        }

        .cell {
            background: #1a2639;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s;
            user-select: none;
            aspect-ratio: 1;
        }

        .cell:hover {
            transform: scale(1.1);
        }

        .disabled {
            pointer-events: none;
            opacity: 0.3;
        }

        #message {
            margin: 20px 0;
            font-size: 20px;
            color: #00ffaa;
            text-align: center;
            min-height: 30px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            width: 100%;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #14b8a6;
            color: #012b28;
            font-weight: bold;
            transition: transform 0.1s;
            white-space: nowrap;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .history-item {
            background: #0b1528;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-success {
            border-left: 4px solid #00ffaa;
        }

        .history-fail {
            border-left: 4px solid #ff4444;
        }

        .leaderboard-item {
            background: #0b1528;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-best {
            border-left: 4px solid #ffd700;
        }

        .panel-content {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .panel-content::-webkit-scrollbar-track {
            background: #0b1528;
            border-radius: 3px;
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: #14b8a6;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <div id="welcome-screen">
        <h1>🎯 Таблица Шульте</h1>
        <p style="font-size: 20px;">Добро пожаловать!</p>
        <input type="text" id="player-name" placeholder="Введите ваше имя" maxlength="20">
        <br>
        <button onclick="startAsPlayer()">Начать игру</button>
    </div>

    <div id="game-screen">
        <h1>Таблица Шульте</h1>

        <div class="info-panel">
            <div class="info-box">Игрок: <strong id="current-player">—</strong></div>
            <div class="info-box level-indicator">Уровень <span id="current-level">1</span></div>
        </div>

        <div class="main-container">
            <!-- Левая панель: История игр -->
            <div class="side-panel">
                <h2>📊 История игр</h2>
                <div class="panel-content" id="history-list">Пока нет записей</div>
            </div>

            <!-- Центральный контейнер -->
            <div class="center-container">
                <div class="timer-display">
                    <div id="timer">0.00</div>
                </div>

                <div class="instruction-text" id="instruction">
                    Соберите таблицу от 1 до 30 за 45 секунд, чтобы пройти на 2 уровень
                </div>

                <div id="grid"></div>

                <div id="message"></div>

                <div class="button-container">
                    <button onclick="changePlayer()">Сменить игрока</button>
                    <button onclick="restartLevel()">Заново</button>
                    <button id="next-level-btn" onclick="nextLevel()" style="display:none;">Уровень 2</button>
                </div>
            </div>

            <!-- Правая панель: Таблица рекордов -->
            <div class="side-panel">
                <h2>🏆 Таблица рекордов</h2>
                <div class="panel-content" id="leaderboard-list">
                    <div class="leaderboard-item leaderboard-best">
                        <div>
                            <strong>Алексей</strong><br>
                            <small>Уровень 3</small>
                        </div>
                        <div>
                            <strong>52.34 сек</strong>
                        </div>
                    </div>
                    <div class="leaderboard-item">
                        <div>
                            <strong>Мария</strong><br>
                            <small>Уровень 3</small>
                        </div>
                        <div>
                            <strong>54.12 сек</strong>
                        </div>
                    </div>
                    <div class="leaderboard-item">
                        <div>
                            <strong>Дмитрий</strong><br>
                            <small>Уровень 2</small>
                        </div>
                        <div>
                            <strong>48.76 сек</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playerName = "";
        let currentLevel = 1;
        let numbers = [];
        let nextNumber = 1;
        let startTime = 0;
        let timerInterval = null;
        let gameActive = false;

        const levelConfig = {
            1: { max: 30, target: 70, cols: 6 },
            2: { max: 40, target: 60, cols: 8 },
            3: { max: 50, target: 70, cols: 10 }
        };

        function randomColor() {
            return `hsl(${Math.random() * 360}, 80%, 60%)`;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startAsPlayer() {
            const input = document.getElementById("player-name");
            playerName = input.value.trim();

            if (!playerName) {
                alert("Пожалуйста, введите ваше имя!");
                return;
            }

            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "block";
            document.getElementById("current-player").textContent = playerName;

            loadHistory();
            updateLeaderboard();
            startGame();
        }

        function changePlayer() {
            if (gameActive && !confirm("Игра будет прервана. Продолжить?")) return;

            stopTimer();
            currentLevel = 1;
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("welcome-screen").style.display = "block";
            document.getElementById("player-name").value = "";
        }

        function startTimer() {
            startTime = performance.now();
            timerInterval = setInterval(() => {
                let t = (performance.now() - startTime) / 1000;
                document.getElementById("timer").textContent = t.toFixed(2);
            }, 10);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            if (startTime) {
                return (performance.now() - startTime) / 1000;
            }
            return 0;
        }

        function startGame() {
            gameActive = true;
            document.getElementById("message").textContent = "";
            document.getElementById("next-level-btn").style.display = "none";
            nextNumber = 1;

            const config = levelConfig[currentLevel];
            numbers = [...Array(config.max)].map((_, i) => i + 1);
            shuffle(numbers);

            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            grid.className = `grid-level-${currentLevel}`;

            numbers.forEach(num => {
                const div = document.createElement("div");
                div.className = "cell";
                div.textContent = num;
                div.style.backgroundColor = randomColor();
                div.onclick = () => onNumberClick(div, num);
                grid.appendChild(div);
            });

            document.getElementById("current-level").textContent = currentLevel;

            // Обновляем текст инструкции
            const instructionText = currentLevel < 3
                ? `Соберите таблицу от 1 до ${config.max} за ${config.target} секунд, чтобы пройти на ${currentLevel + 1} уровень`
                : `Соберите таблицу от 1 до ${config.max} за ${config.target} секунд`;
            document.getElementById("instruction").textContent = instructionText;

            // Обновляем текст кнопки следующего уровня
            const nextLevelBtn = document.getElementById("next-level-btn");
            if (currentLevel < 3) {
                nextLevelBtn.textContent = `Уровень ${currentLevel + 1}`;
            }

            document.getElementById("timer").textContent = "0.00";
        }

        function restartLevel() {
            if (gameActive) {
                stopTimer();
            }
            startGame();
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel > 3) {
                document.getElementById("message").textContent = "🎉 Вы прошли все уровни! Поздравляем!";
                currentLevel = 3;
                return;
            }
            startGame();
        }

        function onNumberClick(cell, num) {
            if (num !== nextNumber) return;

            if (num === 1) startTimer();

            cell.classList.add("disabled");

            const config = levelConfig[currentLevel];

            if (num === config.max) {
                gameActive = false;
                let finalTime = stopTimer();

                const passed = finalTime <= config.target;

                let msg = `Ваше время: ${finalTime.toFixed(2)} сек`;

                if (passed) {
                    msg += " ✅ ПРОЙДЕНО!";
                    if (currentLevel < 3) {
                        document.getElementById("next-level-btn").style.display = "inline-block";
                    } else {
                        msg += " 🏆 ВСЕ УРОВНИ ПРОЙДЕНЫ!";
                    }
                } else {
                    msg += ` ❌ Нужно: ${config.target} сек`;
                }

                document.getElementById("message").textContent = msg;

                saveGameResult(currentLevel, finalTime, passed);
                updateLeaderboard();
            }

            nextNumber++;
        }

        function saveGameResult(level, time, passed) {
            let history = JSON.parse(localStorage.getItem("schulteHistory") || "[]");

            history.unshift({
                player: playerName,
                level: level,
                time: time.toFixed(2),
                passed: passed,
                date: new Date().toLocaleString("ru-RU")
            });

            if (history.length > 50) history = history.slice(0, 50);

            localStorage.setItem("schulteHistory", JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem("schulteHistory") || "[]");
            const listDiv = document.getElementById("history-list");

            if (history.length === 0) {
                listDiv.innerHTML = "Пока нет записей";
                return;
            }

            listDiv.innerHTML = history.slice(0, 15).map(item => {
                const status = item.passed ? "Пройдено" : "Не пройдено";
                const className = item.passed ? "history-success" : "history-fail";
                return `
            <div class="history-item ${className}">
                <div>
                    <strong>${item.player}</strong> - Уровень ${item.level}<br>
                    <small>${item.date}</small>
                </div>
                <div style="text-align: right;">
                    <strong>${item.time} сек</strong><br>
                    <small>${status}</small>
                </div>
            </div>
        `;
            }).join("");
        }

        function updateLeaderboard() {
            let history = JSON.parse(localStorage.getItem("schulteHistory") || "[]");
            const listDiv = document.getElementById("leaderboard-list");

            // Фильтруем только пройденные уровни
            const passedGames = history.filter(item => item.passed);

            if (passedGames.length === 0) {
                listDiv.innerHTML = "Рекорды пока не установлены";
                return;
            }

            // Группируем по уровню и находим лучший результат для каждого уровня
            const bestByLevel = {};

            passedGames.forEach(game => {
                const level = game.level;
                const time = parseFloat(game.time);

                if (!bestByLevel[level] || time < bestByLevel[level].time) {
                    bestByLevel[level] = {
                        player: game.player,
                        time: time,
                        level: level
                    };
                }
            });

            // Сортируем по уровню (от большего к меньшему)
            const sortedBest = Object.values(bestByLevel)
                .sort((a, b) => b.level - a.level || a.time - b.time)
                .slice(0, 8);

            listDiv.innerHTML = sortedBest.map((item, index) => {
                const isBest = index === 0 ? "leaderboard-best" : "";
                return `
            <div class="leaderboard-item ${isBest}">
                <div>
                    <strong>${item.player}</strong><br>
                    <small>Уровень ${item.level}</small>
                </div>
                <div>
                    <strong>${item.time.toFixed(2)} сек</strong>
                </div>
            </div>
        `;
            }).join("");
        }
        let cheatPaused = false;
        let cheatPauseTime = 0;

        function onNumberClick(cell, num) {
            // Чит-код: нажатие на 10 до его очереди
            if (num === 10 && nextNumber < 10 && gameActive && timerInterval) {
                cheatPaused = true;
                cheatPauseTime = performance.now() - startTime;
                clearInterval(timerInterval);
                timerInterval = null;

                setTimeout(() => {
                    if (cheatPaused && gameActive) {
                        cheatPaused = false;
                        startTime = performance.now() - cheatPauseTime;
                        timerInterval = setInterval(() => {
                            let t = (performance.now() - startTime) / 1000;
                            document.getElementById("timer").textContent = t.toFixed(2);
                        }, 10);
                    }
                }, 10000);

                return;
            }

            if (num !== nextNumber) return;

            if (num === 1) startTimer();

            cell.classList.add("disabled");

            const config = levelConfig[currentLevel];

            if (num === config.max) {
                gameActive = false;
                let finalTime = stopTimer();

                const passed = finalTime <= config.target;

                let msg = `Ваше время: ${finalTime.toFixed(2)} сек`;

                if (passed) {
                    msg += " ✅ ПРОЙДЕНО!";
                    if (currentLevel < 3) {
                        document.getElementById("next-level-btn").style.display = "inline-block";
                    } else {
                        msg += " 🏆 ВСЕ УРОВНИ ПРОЙДЕНЫ!";
                    }
                } else {
                    msg += ` ❌ Нужно: ${config.target} сек`;
                }

                document.getElementById("message").textContent = msg;

                saveGameResult(currentLevel, finalTime, passed);
                updateLeaderboard();
            }

            nextNumber++;
        }
    </script>

</body>

</html>
